<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hassan — bilingual emcee, host. Built for the stage: tech, brand and cultural events across Saudi Arabia." />
    <title>Hassan — Bilingual Host & MC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  <script>
    (function () {
      var l;
      try { l = localStorage.getItem('lang') } catch {}
      if (l !== 'ar' && l !== 'en') {
        l = (navigator.language || navigator.languages && navigator.languages[0] || 'en').slice(0, 2) === 'ar' ? 'ar' : 'en';
      }
      document.documentElement.lang = l;
      document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
    })();
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
